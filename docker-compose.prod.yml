services:
  postgres:
    image: postgres:15-alpine
    container_name: todo_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todos_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/alien200211/todo-backend:latest
    container_name: todo_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - backend.env
    ports:
      - "8091:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ghcr.io/alien200211/todo-frontend:latest
    container_name: todo_frontend
    restart: always
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: /api
    ports:
      - "3011:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3010"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

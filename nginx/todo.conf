upstream todo_backend {
    server 127.0.0.1:8090;
}

upstream todo_frontend {
    server 127.0.0.1:3010;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name todo.egarcglobal.com www.todo.egarcglobal.com;

    ssl_certificate /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # Redirect HTTP to HTTPS (only if not from Cloudflare)
    if ($http_cf_visitor !~ "https") {
        rewrite ^(.*)$ https://$server_name$1 permanent;
    }

    location / {
        proxy_pass http://todo_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://todo_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://todo_backend/health;
    }
}
